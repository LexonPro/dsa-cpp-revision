<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA C++ Revision</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
    }

    /* Sidebar */
    .sidebar {
        width: 250px;
        height: 100vh;
        background: #020617;
        padding: 20px;
        border-right: 1px solid #1e293b;
    }

    .sidebar h2 {
        margin-bottom: 30px;
        color: #38bdf8;
    }

    .sidebar a {
        display: block;
        padding: 12px;
        margin: 10px 0;
        text-decoration: none;
        color: #cbd5f5;
        border-radius: 8px;
        transition: 0.3s;
    }

    .sidebar a:hover {
        background: #1e293b;
    }

    /* Main Content */
    .main {
        flex: 1;
        padding: 40px;
    }

    .title {
        font-size: 2rem;
        margin-bottom: 30px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
    }

    .card {
        background: #1e293b;
        padding: 20px;
        border-radius: 16px;
        transition: 0.3s;
        cursor: pointer;
        border: 1px solid transparent;
    }

    .card:hover {
        transform: translateY(-5px);
        border: 1px solid #38bdf8;
    }

    .card h3 {
        margin-bottom: 10px;
    }

    .card p {
        font-size: 0.9rem;
        color: #94a3b8;
    }
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>DSA Revision</h2>
    <a href="array.html">Arrays</a>
    <a href="strings.html">Strings</a>
    <a href="recursion.html">Recursion</a>
</div>

<!-- Main -->
<div class="main">
    <div class="title">🚀 Welcome to DSA C++ Revision</div>

    <div class="grid">
        
        <div class="card" onclick="location.href='array.html'">
            <h3>Arrays</h3>
            <p>Learn patterns, prefix sum, Kadane, 2D arrays</p>
        </div>

        <div class="card" onclick="location.href='strings.html'">
            <h3>Strings</h3>
            <p>Master string manipulation & sliding window</p>
        </div>

        <div class="card" onclick="location.href='recursion.html'">
            <h3>Recursion</h3>
            <p>Backtracking, subsets, recursion tree</p>
        </div>

    </div>
</div>

</body>
</html>
